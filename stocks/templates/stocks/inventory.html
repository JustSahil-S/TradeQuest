<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TradeQuest - Inventory</title>
    <style>
      :root {
        --bg: #101014;
        --text: #d0d0de;
        --muted: #8e8ea8;
        --purple-2: #b59bff;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        color: var(--text);
        background: radial-gradient(circle at 20% 10%, rgba(200, 200, 210, 0.08), transparent 35%),
          var(--bg);
      }
      .wrap {
        max-width: 1100px;
        padding: 24px 20px 40px;
      }
      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }
      h1 {
        margin: 0;
        color: var(--purple-2);
      }
      .home-link {
        color: var(--text);
        text-decoration: none;
        border: 1px solid rgba(255, 255, 255, 0.06);
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.22);
      }
      .muted {
        color: var(--muted);
      }
      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 12px;
      }
      .card {
        border: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(50, 50, 60, 0.35);
        border-radius: 14px;
        padding: 14px;
      }
      .card .name {
        font-weight: 800;
        color: var(--purple-2);
        margin-bottom: 6px;
      }
      .card .desc {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
        margin-bottom: 10px;
      }
      .card .meta {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <h1>Power Ups Inventory</h1>
        <a class="home-link" href="{% url 'home' %}">Back to Trading</a>
      </div>

      {% if items %}
      <div class="cards">
        {% for i in items %}
        <div class="card">
          <div class="name">{{ i.powerup.name }}</div>
          <div class="desc">{{ i.powerup.description|default:"" }}</div>
          <div class="meta">
            <div>Qty: <b>{{ i.quantity }}</b></div>
            <div class="muted">Acquired: {{ i.acquired_at }}</div>
          </div>
        </div>
        {% endfor %}
      </div>
      {% else %}
      <p class="muted">Your inventory is empty for now.</p>
      {% endif %}
    </div>
  </body>
</html>
