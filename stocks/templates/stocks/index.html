<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TradeQuest</title>
    <style>
      :root {
        --bg: #05050a;
        --panel: rgba(16, 16, 28, 0.7);
        --text: #c9c9d8;
        --muted: #8e8ea8;
        --purple: #8a5cff;
        --purple-2: #b59bff;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica,
          Arial, "Apple Color Emoji", "Segoe UI Emoji";
        color: var(--text);
        background: radial-gradient(
            circle at 20% 10%,
            rgba(138, 92, 255, 0.18),
            transparent 35%
          ),
          radial-gradient(circle at 70% 60%, rgba(138, 92, 255, 0.12), transparent 40%),
          var(--bg);
        min-height: 100vh;
      }

      /* Simple "space dust" stars without external assets */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image: radial-gradient(rgba(255, 255, 255, 0.7) 1px, transparent 1px);
        background-size: 120px 120px;
        opacity: 0.12;
      }

      .navbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 20px;
        background: #000;
        border-bottom: 1px solid rgba(181, 155, 255, 0.25);
      }

      .brand-button {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 220px;
        padding: 0;
        background: transparent;
        color: inherit;
        border: none;
        cursor: pointer;
        text-align: left;
      }

      .avatar {
        width: 34px;
        height: 34px;
        border-radius: 999px;
        background: linear-gradient(135deg, rgba(138, 92, 255, 1), rgba(181, 155, 255, 0.6));
        box-shadow: 0 0 0 2px rgba(138, 92, 255, 0.2);
        display: grid;
        place-items: center;
      }

      .avatar svg {
        width: 18px;
        height: 18px;
        color: #0b0b12;
      }

      .username {
        font-weight: 650;
        color: var(--purple-2);
        line-height: 1.1;
      }

      .right {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .profile-menu-wrap {
        position: relative;
        display: inline-flex;
      }

      .profile-menu {
        position: absolute;
        top: calc(100% + 10px);
        left: 0;
        min-width: 210px;
        background: rgba(0, 0, 0, 0.92);
        border: 1px solid rgba(181, 155, 255, 0.25);
        border-radius: 14px;
        box-shadow: 0 16px 50px rgba(0, 0, 0, 0.55);
        overflow: hidden;
        opacity: 0;
        transform: translateY(-6px);
        pointer-events: none;
        transition: opacity 120ms ease, transform 120ms ease;
      }

      .profile-menu.open {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .profile-menu-item {
        width: 100%;
        padding: 12px 14px;
        background: transparent;
        border: none;
        cursor: pointer;
        color: var(--text);
        font-weight: 600;
        text-align: left;
      }

      .profile-menu-item:hover {
        background: rgba(138, 92, 255, 0.12);
      }

      .profile-menu-form {
        margin: 0;
      }

      .stardust {
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(138, 92, 255, 0.12);
        border: 1px solid rgba(138, 92, 255, 0.28);
        color: var(--text);
        font-weight: 600;
      }

      .content {
        padding: 26px 20px 60px;
        max-width: 900px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        letter-spacing: 0.2px;
        color: var(--purple-2);
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      .chart-card {
        margin-top: 18px;
        padding: 16px 16px 18px;
        border-radius: 16px;
        background: rgba(16, 16, 28, 0.45);
        border: 1px solid rgba(181, 155, 255, 0.2);
      }

      .chart-canvas-wrap {
        height: 110px;
      }

      .chart-canvas-wrap canvas {
        height: 110px !important;
        width: 100% !important;
        display: block;
      }

      .chart-title {
        font-weight: 700;
        color: var(--purple-2);
        margin-bottom: 10px;
      }

      .search-wrap {
        position: relative;
        margin: 0 0 12px;
      }

      .symbol-search {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid rgba(181, 155, 255, 0.28);
        background: rgba(0, 0, 0, 0.45);
        color: var(--text);
        border-radius: 10px;
        padding: 10px 12px;
        outline: none;
      }

      .symbol-search:focus {
        border-color: rgba(181, 155, 255, 0.6);
        box-shadow: 0 0 0 2px rgba(181, 155, 255, 0.15);
      }

      .search-results {
        position: absolute;
        left: 0;
        right: 0;
        margin-top: 6px;
        background: rgba(10, 10, 18, 0.96);
        border: 1px solid rgba(181, 155, 255, 0.25);
        border-radius: 10px;
        overflow: hidden;
        z-index: 20;
        display: none;
      }

      .search-results.open {
        display: block;
      }

      .search-item {
        width: 100%;
        border: none;
        background: transparent;
        color: var(--text);
        text-align: left;
        padding: 10px 12px;
        cursor: pointer;
      }

      .search-item:hover {
        background: rgba(138, 92, 255, 0.12);
      }

      .search-item small {
        color: var(--muted);
        display: block;
        margin-top: 3px;
      }

      .loading {
        color: var(--muted);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="navbar">
      <div class="profile-menu-wrap">
        <button
          type="button"
          class="brand-button"
          id="profileMenuButton"
          aria-haspopup="menu"
          aria-expanded="false"
          aria-controls="profileMenu"
        >
          <div class="avatar" aria-hidden="true">
            <!-- Minimal "profile" icon -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21a8 8 0 0 0-16 0" />
              <circle cx="12" cy="8" r="4" />
            </svg>
          </div>
          <div class="username">{{ user.username }}</div>
        </button>

        <div class="profile-menu" id="profileMenu" role="menu" aria-labelledby="profileMenuButton">
          <form method="post" action="{% url 'logout' %}" class="profile-menu-form">
            {% csrf_token %}
            <button type="submit" class="profile-menu-item" role="menuitem">Logout</button>
          </form>
        </div>
      </div>

      <div class="right">
        <div class="stardust">Stardust: {{ user.profile.stardust_balance }}</div>
      </div>
    </div>

    <div class="content">
      <h1>TradeQuest</h1>
      <p>Paper stocks (virtual trading) app is running.</p>

      <div class="chart-card">
        <div class="search-wrap">
          <input
            id="symbolSearch"
            class="symbol-search"
            type="text"
            autocomplete="off"
            placeholder="Search ticker (e.g. AAPL, MSFT, TSLA)"
          />
          <div id="searchResults" class="search-results"></div>
        </div>

        <div class="chart-title" id="chartTitle">Loading symbol... - Weekly Closing Price</div>
        <div id="chartStatus" class="loading">Loading chart...</div>
        <div class="chart-canvas-wrap">
          <canvas id="aaplChart"></canvas>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
      (function () {
        const btn = document.getElementById("profileMenuButton");
        const menu = document.getElementById("profileMenu");
        if (!btn || !menu) return;

        function closeMenu() {
          menu.classList.remove("open");
          btn.setAttribute("aria-expanded", "false");
        }

        function toggleMenu(e) {
          e.stopPropagation();
          const isOpen = menu.classList.toggle("open");
          btn.setAttribute("aria-expanded", String(isOpen));
        }

        btn.addEventListener("click", toggleMenu);

        document.addEventListener("click", function (e) {
          if (!menu.contains(e.target) && !btn.contains(e.target)) closeMenu();
        });

        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape") closeMenu();
        });
      })();
    </script>

    <script>
      (function () {
        const statusEl = document.getElementById("chartStatus");
        const canvas = document.getElementById("aaplChart");
        const input = document.getElementById("symbolSearch");
        const resultsEl = document.getElementById("searchResults");
        const titleEl = document.getElementById("chartTitle");
        if (!statusEl || !canvas || !input || !resultsEl) return;

        let chart = null;
        let debounceTimer = null;

        function hideResults() {
          resultsEl.classList.remove("open");
          resultsEl.innerHTML = "";
        }

        function showResults(items) {
          if (!items?.length) {
            hideResults();
            return;
          }

          resultsEl.innerHTML = "";
          for (const item of items) {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "search-item";
            btn.innerHTML =
              "<strong>" +
              item.symbol +
              "</strong> - " +
              item.name +
              "<small>" +
              (item.region || "Unknown region") +
              (item.currency ? " | " + item.currency : "") +
              "</small>";
            btn.addEventListener("click", function () {
              input.value = item.symbol;
              hideResults();
              loadChart(item.symbol);
            });
            resultsEl.appendChild(btn);
          }
          resultsEl.classList.add("open");
        }

        async function runSearch(query) {
          if (!query || query.length < 2) {
            hideResults();
            return;
          }
          try {
            const res = await fetch(
              "{% url 'symbol_search' %}?q=" + encodeURIComponent(query),
              { headers: { Accept: "application/json" } }
            );
            const payload = await res.json();
            if (!res.ok) throw new Error(payload?.error || "Search failed");
            showResults(payload.results || []);
          } catch (e) {
            hideResults();
          }
        }

        input.addEventListener("input", function (e) {
          const q = e.target.value.trim();
          clearTimeout(debounceTimer);
          debounceTimer = setTimeout(function () {
            runSearch(q);
          }, 220);
        });

        document.addEventListener("click", function (e) {
          if (!resultsEl.contains(e.target) && e.target !== input) hideResults();
        });

        input.addEventListener("keydown", function (e) {
          if (e.key === "Enter") {
            e.preventDefault();
            hideResults();
            const symbol = input.value.trim().toUpperCase();
            if (symbol) loadChart(symbol);
          }
        });

        async function loadChart(symbol) {
          statusEl.textContent = "Loading chart...";
          try {
            const url = "{% url 'aapl_chart' %}?symbol=" + encodeURIComponent(symbol || "AAPL");
            const res = await fetch(url, { headers: { Accept: "application/json" } });
            const payload = await res.json();
            if (!res.ok) throw new Error(payload?.error || "Failed to fetch chart data");

            statusEl.textContent = "Chart loaded";
            if (titleEl && payload?.symbol) {
              titleEl.textContent = payload.symbol + " - Weekly Closing Price";
            }

            if (chart) chart.destroy();
            const ctx = canvas.getContext("2d");
            chart = new Chart(ctx, {
              type: "line",
              data: {
                labels: payload.labels,
                datasets: [
                  {
                    label: (payload?.symbol || "Stock") + " Weekly Close",
                    data: payload.closes,
                    borderColor: "rgba(181, 155, 255, 1)",
                    backgroundColor: "rgba(181, 155, 255, 0.12)",
                    fill: true,
                    tension: 0.3,
                    pointRadius: 0,
                  },
                ],
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                plugins: {
                  legend: {
                    labels: { color: "#b59bff" },
                  },
                  tooltip: {
                    callbacks: {
                      label: function (context) {
                        const v = context.parsed.y;
                        return " Close: " + v;
                      },
                    },
                  },
                },
                scales: {
                  x: {
                    ticks: { color: "#8e8ea8", maxTicksLimit: 6 },
                    grid: { color: "rgba(181, 155, 255, 0.12)" },
                  },
                  y: {
                    ticks: { color: "#8e8ea8" },
                    grid: { color: "rgba(181, 155, 255, 0.12)" },
                  },
                },
              },
            });
          } catch (e) {
            console.error(e);
            statusEl.textContent = "Could not load chart: " + (e?.message || "Unknown error");
          }
        }

        loadChart("AAPL");
      })();
    </script>
  </body>
</html>
