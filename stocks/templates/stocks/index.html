<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TradeQuest</title>
    <style>
      :root {
        --bg: #05050a;
        --panel: rgba(16, 16, 28, 0.7);
        --text: #c9c9d8;
        --muted: #8e8ea8;
        --purple: #8a5cff;
        --purple-2: #b59bff;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica,
          Arial, "Apple Color Emoji", "Segoe UI Emoji";
        color: var(--text);
        background: radial-gradient(
            circle at 20% 10%,
            rgba(138, 92, 255, 0.18),
            transparent 35%
          ),
          radial-gradient(circle at 70% 60%, rgba(138, 92, 255, 0.12), transparent 40%),
          var(--bg);
        min-height: 100vh;
      }

      /* Simple "space dust" stars without external assets */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image: radial-gradient(rgba(255, 255, 255, 0.7) 1px, transparent 1px);
        background-size: 120px 120px;
        opacity: 0.12;
      }

      .navbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 20px;
        background: #000;
        border-bottom: 1px solid rgba(181, 155, 255, 0.25);
      }

      .brand-button {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 220px;
        padding: 0;
        background: transparent;
        color: inherit;
        border: none;
        cursor: pointer;
        text-align: left;
      }

      .avatar {
        width: 34px;
        height: 34px;
        border-radius: 999px;
        background: linear-gradient(135deg, rgba(138, 92, 255, 1), rgba(181, 155, 255, 0.6));
        box-shadow: 0 0 0 2px rgba(138, 92, 255, 0.2);
        display: grid;
        place-items: center;
      }

      .avatar svg {
        width: 18px;
        height: 18px;
        color: #0b0b12;
      }

      .username {
        font-weight: 650;
        color: var(--purple-2);
        line-height: 1.1;
      }

      .right {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .profile-menu-wrap {
        position: relative;
        display: inline-flex;
      }

      .profile-menu {
        position: absolute;
        top: calc(100% + 10px);
        left: 0;
        min-width: 210px;
        background: rgba(0, 0, 0, 0.92);
        border: 1px solid rgba(181, 155, 255, 0.25);
        border-radius: 14px;
        box-shadow: 0 16px 50px rgba(0, 0, 0, 0.55);
        overflow: hidden;
        opacity: 0;
        transform: translateY(-6px);
        pointer-events: none;
        transition: opacity 120ms ease, transform 120ms ease;
      }

      .profile-menu.open {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .profile-menu-item {
        width: 100%;
        padding: 12px 14px;
        background: transparent;
        border: none;
        cursor: pointer;
        color: var(--text);
        font-weight: 600;
        text-align: left;
      }

      .profile-menu-item:hover {
        background: rgba(138, 92, 255, 0.12);
      }

      .profile-menu-form {
        margin: 0;
      }

      .stardust {
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(138, 92, 255, 0.12);
        border: 1px solid rgba(138, 92, 255, 0.28);
        color: var(--text);
        font-weight: 600;
      }

      .content {
        padding: 26px 20px 60px;
        max-width: 1200px;
      }

      .dashboard-grid {
        margin-top: 18px;
        display: grid;
        grid-template-columns: minmax(0, 2fr) minmax(280px, 1fr);
        gap: 16px;
      }

      @media (max-width: 980px) {
        .dashboard-grid {
          grid-template-columns: 1fr;
        }
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        letter-spacing: 0.2px;
        color: var(--purple-2);
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      .chart-card {
        padding: 16px 16px 18px;
        border-radius: 16px;
        background: rgba(16, 16, 28, 0.45);
        border: 1px solid rgba(181, 155, 255, 0.2);
      }

      .portfolio-card {
        padding: 16px;
        border-radius: 16px;
        background: rgba(16, 16, 28, 0.45);
        border: 1px solid rgba(181, 155, 255, 0.2);
      }

      .portfolio-title {
        margin: 0 0 10px;
        color: var(--purple-2);
        font-size: 18px;
        font-weight: 700;
      }

      .portfolio-total {
        color: var(--text);
        margin: 0 0 10px;
        font-size: 13px;
      }

      .portfolio-list {
        display: grid;
        gap: 8px;
      }

      .portfolio-item {
        border: 1px solid rgba(181, 155, 255, 0.16);
        border-radius: 10px;
        padding: 10px;
        background: rgba(0, 0, 0, 0.2);
      }

      .portfolio-item .top {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
      }

      .portfolio-item .symbol {
        font-weight: 700;
        color: #e8deff;
      }

      .portfolio-item .value {
        color: #d7c8ff;
        font-weight: 600;
        font-size: 13px;
      }

      .portfolio-item .meta {
        margin-top: 4px;
        font-size: 12px;
        color: var(--muted);
      }

      .chart-canvas-wrap {
        height: 250px;
      }

      .chart-canvas-wrap canvas {
        height: 250px !important;
        width: 100% !important;
        display: block;
      }

      .chart-title {
        font-weight: 700;
        color: var(--purple-2);
        margin-bottom: 10px;
      }

      .search-wrap {
        position: relative;
        margin: 0 0 12px;
      }

      .symbol-search {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid rgba(181, 155, 255, 0.28);
        background: rgba(0, 0, 0, 0.45);
        color: var(--text);
        border-radius: 10px;
        padding: 10px 12px;
        outline: none;
      }

      .symbol-search:focus {
        border-color: rgba(181, 155, 255, 0.6);
        box-shadow: 0 0 0 2px rgba(181, 155, 255, 0.15);
      }

      .search-results {
        position: absolute;
        left: 0;
        right: 0;
        margin-top: 6px;
        background: rgba(10, 10, 18, 0.96);
        border: 1px solid rgba(181, 155, 255, 0.25);
        border-radius: 10px;
        overflow: hidden;
        z-index: 20;
        display: none;
      }

      .search-results.open {
        display: block;
      }

      .search-item {
        width: 100%;
        border: none;
        background: transparent;
        color: var(--text);
        text-align: left;
        padding: 10px 12px;
        cursor: pointer;
      }

      .search-item:hover {
        background: rgba(138, 92, 255, 0.12);
      }

      .search-item small {
        color: var(--muted);
        display: block;
        margin-top: 3px;
      }

      .loading {
        color: var(--muted);
        font-size: 14px;
      }

      .buy-panel {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid rgba(181, 155, 255, 0.2);
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      .buy-panel label {
        color: var(--muted);
        font-size: 13px;
      }

      .qty-input {
        width: 96px;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid rgba(181, 155, 255, 0.3);
        background: rgba(0, 0, 0, 0.35);
        color: var(--text);
      }

      .buy-btn {
        padding: 9px 12px;
        border-radius: 8px;
        border: 1px solid rgba(181, 155, 255, 0.45);
        background: rgba(138, 92, 255, 0.22);
        color: #efe9ff;
        cursor: pointer;
        font-weight: 600;
      }

      .buy-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .buy-meta {
        color: var(--muted);
        font-size: 12px;
      }

      .chart-controls {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }

      .tf-group {
        display: flex;
        gap: 8px;
      }

      .tf-btn {
        border: 1px solid rgba(181, 155, 255, 0.28);
        background: rgba(0, 0, 0, 0.35);
        color: var(--text);
        border-radius: 8px;
        padding: 7px 10px;
        cursor: pointer;
        font-size: 13px;
      }

      .tf-btn.active {
        background: rgba(138, 92, 255, 0.22);
        border-color: rgba(181, 155, 255, 0.65);
        color: #ddd2ff;
      }

      .zoom-wrap {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 260px;
      }

      .zoom-wrap label {
        color: var(--muted);
        font-size: 13px;
      }

      .zoom-wrap input[type="range"] {
        flex: 1;
        accent-color: #b59bff;
        height: 24px;
      }

      .zoom-wrap input[type="range"]::-webkit-slider-runnable-track {
        height: 6px;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(138, 92, 255, 0.95), rgba(181, 155, 255, 0.95));
      }

      .zoom-wrap input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 999px;
        background: #efe9ff;
        border: 2px solid #7f59e8;
        margin-top: -4px;
      }

      .zoom-value {
        font-size: 12px;
        color: var(--purple-2);
        min-width: 72px;
        text-align: right;
      }
    </style>
  </head>
  <body>
    <div class="navbar">
      <div class="profile-menu-wrap">
        <button
          type="button"
          class="brand-button"
          id="profileMenuButton"
          aria-haspopup="menu"
          aria-expanded="false"
          aria-controls="profileMenu"
        >
          <div class="avatar" aria-hidden="true">
            <!-- Minimal "profile" icon -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21a8 8 0 0 0-16 0" />
              <circle cx="12" cy="8" r="4" />
            </svg>
          </div>
          <div class="username">{{ user.username }}</div>
        </button>

        <div class="profile-menu" id="profileMenu" role="menu" aria-labelledby="profileMenuButton">
          <form method="post" action="{% url 'logout' %}" class="profile-menu-form">
            {% csrf_token %}
            <button type="submit" class="profile-menu-item" role="menuitem">Logout</button>
          </form>
        </div>
      </div>

      <div class="right">
        <div class="stardust" id="stardustBadge">Stardust: {{ user.profile.stardust_balance }}</div>
      </div>
    </div>

    <div class="content">
      <h1>TradeQuest</h1>
      <p>Paper stocks (virtual trading) app is running.</p>

      <div class="dashboard-grid">
        <div class="chart-card">
          <div class="search-wrap">
            <input
              id="symbolSearch"
              class="symbol-search"
              type="text"
              autocomplete="off"
              placeholder="Search ticker (e.g. AAPL, MSFT, TSLA)"
            />
            <div id="searchResults" class="search-results"></div>
          </div>

          <div class="chart-controls">
            <div class="tf-group">
              <button type="button" class="tf-btn" data-timeframe="d">Days</button>
              <button type="button" class="tf-btn active" data-timeframe="w">Weeks</button>
              <button type="button" class="tf-btn" data-timeframe="m">Months</button>
              <button type="button" class="tf-btn" data-timeframe="ytd">YTD</button>
            </div>
            <div class="zoom-wrap">
              <label for="zoomSlider">Zoom</label>
              <input id="zoomSlider" type="range" min="20" max="120" step="1" value="52" />
            </div>
          </div>

          <div class="chart-title" id="chartTitle">Loading symbol... - Weekly Closing Price</div>
          <div id="chartStatus" class="loading"></div>
          <div class="chart-canvas-wrap">
            <canvas id="aaplChart"></canvas>
          </div>
          <div class="buy-panel">
            <label for="buyQty">Buy shares</label>
            <input id="buyQty" class="qty-input" type="number" min="1" step="1" value="1" />
            <button id="buyBtn" type="button" class="buy-btn">Buy selected stock</button>
            <div id="buyMeta" class="buy-meta"></div>
          </div>
        </div>
        <div class="portfolio-card">
          <h2 class="portfolio-title">Your Portfolio</h2>
          <p class="portfolio-total" id="portfolioTotal">Total value: 0 stardust</p>
          <div class="portfolio-list" id="portfolioList">
            <div class="buy-meta">No positions yet.</div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
      (function () {
        const btn = document.getElementById("profileMenuButton");
        const menu = document.getElementById("profileMenu");
        if (!btn || !menu) return;

        function closeMenu() {
          menu.classList.remove("open");
          btn.setAttribute("aria-expanded", "false");
        }

        function toggleMenu(e) {
          e.stopPropagation();
          const isOpen = menu.classList.toggle("open");
          btn.setAttribute("aria-expanded", String(isOpen));
        }

        btn.addEventListener("click", toggleMenu);

        document.addEventListener("click", function (e) {
          if (!menu.contains(e.target) && !btn.contains(e.target)) closeMenu();
        });

        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape") closeMenu();
        });
      })();
    </script>

    <script>
      (function () {
        const statusEl = document.getElementById("chartStatus");
        const canvas = document.getElementById("aaplChart");
        const input = document.getElementById("symbolSearch");
        const resultsEl = document.getElementById("searchResults");
        const titleEl = document.getElementById("chartTitle");
        const slider = document.getElementById("zoomSlider");
        const tfButtons = Array.from(document.querySelectorAll(".tf-btn"));
        const buyQtyEl = document.getElementById("buyQty");
        const buyBtnEl = document.getElementById("buyBtn");
        const buyMetaEl = document.getElementById("buyMeta");
        const stardustBadgeEl = document.getElementById("stardustBadge");
        const portfolioListEl = document.getElementById("portfolioList");
        const portfolioTotalEl = document.getElementById("portfolioTotal");
        if (
          !statusEl ||
          !canvas ||
          !input ||
          !resultsEl ||
          !slider ||
          !tfButtons.length ||
          !buyQtyEl ||
          !buyBtnEl ||
          !buyMetaEl ||
          !portfolioListEl ||
          !portfolioTotalEl
        )
          return;

        let chart = null;
        let debounceTimer = null;
        let currentSymbol = "AAPL";
        let currentTimeframe = "w";
        let currentPrice = null;

        const timeframeConfig = {
          d: { min: 20, max: 200, defaultPoints: 90, label: "Daily" },
          w: { min: 20, max: 260, defaultPoints: 52, label: "Weekly" },
          m: { min: 12, max: 180, defaultPoints: 48, label: "Monthly" },
          ytd: { min: 20, max: 366, defaultPoints: 220, label: "Year-to-date" },
        };

        const crosshairPlugin = {
          id: "crosshairPlugin",
          afterDatasetsDraw(chartInstance) {
            const active = chartInstance.tooltip?.getActiveElements?.() || [];
            if (!active.length) return;

            const { ctx, chartArea } = chartInstance;
            const x = active[0].element.x;
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(x, chartArea.top);
            ctx.lineTo(x, chartArea.bottom);
            ctx.lineWidth = 1;
            ctx.strokeStyle = "rgba(181, 155, 255, 0.55)";
            ctx.stroke();
            ctx.restore();
          },
        };

        function applyTimeframeConfig(tf, resetValue) {
          const cfg = timeframeConfig[tf] || timeframeConfig.w;
          slider.min = String(cfg.min);
          slider.max = String(cfg.max);
          if (resetValue) {
            slider.value = String(cfg.defaultPoints);
          } else {
            const v = Math.max(cfg.min, Math.min(cfg.max, Number(slider.value || cfg.defaultPoints)));
            slider.value = String(v);
          }
        }

        function setActiveTimeframeButton(tf) {
          tfButtons.forEach((b) => b.classList.toggle("active", b.dataset.timeframe === tf));
        }

        function hideResults() {
          resultsEl.classList.remove("open");
          resultsEl.innerHTML = "";
        }

        function getCookie(name) {
          const v = `; ${document.cookie}`;
          const parts = v.split(`; ${name}=`);
          if (parts.length === 2) return parts.pop().split(";").shift();
          return "";
        }

        function renderPortfolio(payload) {
          const positions = payload?.positions || [];
          portfolioTotalEl.textContent =
            "Total value: " + Number(payload?.portfolio_value_stardust || 0).toLocaleString() + " stardust";

          if (!positions.length) {
            portfolioListEl.innerHTML = '<div class="buy-meta">No positions yet.</div>';
            return;
          }

          portfolioListEl.innerHTML = "";
          for (const p of positions) {
            const item = document.createElement("div");
            item.className = "portfolio-item";
            item.innerHTML =
              '<div class="top">' +
              `<span class="symbol">${p.symbol}</span>` +
              `<span class="value">${Number(p.current_value_stardust || 0).toLocaleString()} stardust</span>` +
              "</div>" +
              '<div class="meta">' +
              `Qty: ${p.quantity} | Current: ${p.current_price_stardust} | Avg: ${p.average_cost_stardust}` +
              "</div>";
            portfolioListEl.appendChild(item);
          }
        }

        async function loadPortfolio() {
          try {
            const res = await fetch("{% url 'portfolio' %}", { headers: { Accept: "application/json" } });
            const payload = await res.json();
            if (!res.ok) throw new Error(payload?.error || "Failed to load portfolio");
            renderPortfolio(payload);
          } catch (e) {
            portfolioListEl.innerHTML = '<div class="buy-meta">Could not load portfolio.</div>';
          }
        }

        function showResults(items) {
          if (!items?.length) {
            hideResults();
            return;
          }

          resultsEl.innerHTML = "";
          for (const item of items) {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "search-item";
            btn.innerHTML =
              "<strong>" +
              item.symbol +
              "</strong> - " +
              item.name +
              "<small>" +
              (item.region || "Unknown region") +
              (item.currency ? " | " + item.currency : "") +
              "</small>";
            btn.addEventListener("click", function () {
              input.value = item.symbol;
              hideResults();
              currentSymbol = item.symbol;
              loadChart(currentSymbol, currentTimeframe, Number(slider.value));
            });
            resultsEl.appendChild(btn);
          }
          resultsEl.classList.add("open");
        }

        async function runSearch(query) {
          if (!query || query.length < 2) {
            hideResults();
            return;
          }
          try {
            const res = await fetch(
              "{% url 'symbol_search' %}?q=" + encodeURIComponent(query),
              { headers: { Accept: "application/json" } }
            );
            const payload = await res.json();
            if (!res.ok) throw new Error(payload?.error || "Search failed");
            showResults(payload.results || []);
          } catch (e) {
            hideResults();
          }
        }

        input.addEventListener("input", function (e) {
          const q = e.target.value.trim();
          clearTimeout(debounceTimer);
          debounceTimer = setTimeout(function () {
            runSearch(q);
          }, 220);
        });

        document.addEventListener("click", function (e) {
          if (!resultsEl.contains(e.target) && e.target !== input) hideResults();
        });

        input.addEventListener("keydown", function (e) {
          if (e.key === "Enter") {
            e.preventDefault();
            hideResults();
            const symbol = input.value.trim().toUpperCase();
            if (symbol) {
              currentSymbol = symbol;
              loadChart(currentSymbol, currentTimeframe, Number(slider.value));
            }
          }
        });

        tfButtons.forEach((btn) => {
          btn.addEventListener("click", function () {
            const tf = btn.dataset.timeframe;
            if (!tf || tf === currentTimeframe) return;
            currentTimeframe = tf;
            setActiveTimeframeButton(tf);
            applyTimeframeConfig(tf, true);
            loadChart(currentSymbol, currentTimeframe, Number(slider.value));
          });
        });

        slider.addEventListener("change", function () {
          loadChart(currentSymbol, currentTimeframe, Number(slider.value));
        });

        async function loadChart(symbol, timeframe, points) {
          statusEl.textContent = "";
          try {
            const url =
              "{% url 'aapl_chart' %}?symbol=" +
              encodeURIComponent(symbol || "AAPL") +
              "&timeframe=" +
              encodeURIComponent(timeframe || "w") +
              "&points=" +
              encodeURIComponent(String(points || 52));
            const res = await fetch(url, { headers: { Accept: "application/json" } });
            const payload = await res.json();
            if (!res.ok) throw new Error(payload?.error || "Failed to fetch chart data");

            statusEl.textContent = "";
            if (titleEl && payload?.symbol) {
              const tfLabel = payload?.timeframe_label
                ? payload.timeframe_label.charAt(0).toUpperCase() + payload.timeframe_label.slice(1)
                : "Price";
              titleEl.textContent = payload.symbol + " - " + tfLabel + " Closing Price";
            }
            currentSymbol = payload?.symbol || currentSymbol;
            currentPrice = Number((payload?.closes || []).slice(-1)[0] || 0);
            if (currentPrice > 0) {
              buyMetaEl.textContent = `Selected: ${currentSymbol} | Last close: ${currentPrice.toFixed(2)} stardust`;
            }

            const values = (payload.closes || []).map(Number).filter((n) => Number.isFinite(n));
            const minV = Math.min(...values);
            const maxV = Math.max(...values);
            const range = Math.max(1, maxV - minV);
            const pad = range * 0.12;
            const yMin = Math.max(0, minV - pad);
            const yMax = maxV + pad;

            if (!chart) {
              const ctx = canvas.getContext("2d");
              chart = new Chart(ctx, {
                type: "line",
                plugins: [crosshairPlugin],
                data: {
                  labels: payload.labels,
                  datasets: [
                    {
                      label: "",
                      data: payload.closes,
                      borderColor: "rgba(181, 155, 255, 1)",
                      backgroundColor: "rgba(181, 155, 255, 0.12)",
                      fill: true,
                      tension: 0.3,
                      pointRadius: 0,
                      pointHoverRadius: 4,
                      pointHoverBackgroundColor: "rgba(239, 233, 255, 1)",
                      pointHoverBorderColor: "rgba(127, 89, 232, 1)",
                      pointHoverBorderWidth: 2,
                    },
                  ],
                },
                options: {
                  responsive: true,
                  maintainAspectRatio: false,
                  animation: {
                    duration: 300,
                    easing: "easeOutQuart",
                  },
                  transitions: {
                    active: {
                      animation: {
                        duration: 200,
                      },
                    },
                  },
                  plugins: {
                    legend: {
                      display: false,
                      labels: { color: "#b59bff" },
                    },
                    tooltip: {
                      intersect: false,
                      mode: "index",
                      callbacks: {
                        label: function (context) {
                          const v = context.parsed.y;
                          return " Close: " + Number(v).toFixed(2);
                        },
                      },
                    },
                  },
                  scales: {
                    x: {
                      ticks: { color: "#8e8ea8", maxTicksLimit: 8 },
                      grid: { color: "rgba(181, 155, 255, 0.12)" },
                    },
                    y: {
                      min: yMin,
                      max: yMax,
                      ticks: { color: "#8e8ea8", maxTicksLimit: 6 },
                      grid: { color: "rgba(181, 155, 255, 0.12)" },
                    },
                  },
                },
                interaction: {
                  intersect: false,
                  mode: "index",
                },
              });
            } else {
              chart.data.labels = payload.labels;
              chart.data.datasets[0].data = payload.closes;
              chart.options.scales.y.min = yMin;
              chart.options.scales.y.max = yMax;
              chart.update();
            }
          } catch (e) {
            console.error(e);
            statusEl.textContent = "Could not load chart: " + (e?.message || "Unknown error");
          }
        }

        buyBtnEl.addEventListener("click", async function () {
          const qty = Number(buyQtyEl.value);
          if (!Number.isInteger(qty) || qty <= 0) {
            buyMetaEl.textContent = "Quantity must be a positive whole number.";
            return;
          }

          buyBtnEl.disabled = true;
          buyMetaEl.textContent = "";
          try {
            const res = await fetch("{% url 'buy_stock' %}", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": getCookie("csrftoken"),
                Accept: "application/json",
              },
              body: JSON.stringify({
                symbol: currentSymbol,
                quantity: qty,
              }),
            });
            const payload = await res.json();
            if (!res.ok) throw new Error(payload?.error || "Buy failed");

            buyMetaEl.textContent =
              `Bought ${payload.quantity_bought} ${payload.symbol} @ ${payload.price_per_share} ` +
              `(${payload.total_cost} stardust).`;
            if (stardustBadgeEl) {
              stardustBadgeEl.textContent = `Stardust: ${payload.remaining_stardust}`;
            }
            loadPortfolio();
          } catch (e) {
            buyMetaEl.textContent = "Buy failed: " + (e?.message || "Unknown error");
          } finally {
            buyBtnEl.disabled = false;
          }
        });

        applyTimeframeConfig(currentTimeframe, true);
        setActiveTimeframeButton(currentTimeframe);
        loadChart(currentSymbol, currentTimeframe, Number(slider.value));
        loadPortfolio();
      })();
    </script>
  </body>
</html>
