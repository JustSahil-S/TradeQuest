<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TradeQuest - Login</title>
    <style>
      :root {
        --bg: #101014;
        --text: #c9c9d8;
        --muted: #8e8ea8;
        --purple: #8a5cff;
        --purple-2: #b59bff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        color: var(--text);
        background: radial-gradient(circle at 20% 10%, rgba(200, 200, 210, 0.08), transparent 35%),
          radial-gradient(circle at 70% 60%, rgba(170, 170, 180, 0.06), transparent 40%), var(--bg);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .auth-card {
        width: min(460px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 18px;
        background: rgba(50, 50, 60, 0.55);
        padding: 22px;
      }

      .title {
        margin: 0 0 6px;
        color: var(--purple-2);
        font-size: 28px;
      }

      .subtitle {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 14px;
      }

      .field {
        margin-bottom: 12px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 13px;
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        border: 1px solid rgba(181, 155, 255, 0.32);
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.35);
        color: var(--text);
        padding: 10px 12px;
        font-size: 14px;
      }

      .error {
        color: #ff8a9d;
        margin: 0 0 12px;
        font-size: 13px;
      }

      .submit-btn {
        width: 100%;
        border: 1px solid rgba(181, 155, 255, 0.45);
        background: rgba(138, 92, 255, 0.22);
        color: #efe9ff;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }

      .auth-link-row {
        margin-top: 14px;
        color: var(--muted);
        font-size: 13px;
      }

      .auth-link-row a {
        color: var(--purple-2);
        text-decoration: none;
      }

      .home-link {
        display: inline-block;
        margin-top: 14px;
        color: var(--muted);
        text-decoration: none;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main class="auth-card">
      <h1 class="title">Welcome back</h1>
      <p class="subtitle">Sign in to continue your TradeQuest run.</p>

      {% if form.errors %}
      <p class="error">Invalid username or password.</p>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="field">
          <label for="id_username">Username</label>
          {{ form.username }}
        </div>
        <div class="field">
          <label for="id_password">Password</label>
          {{ form.password }}
        </div>
        {% if next %}
        <input type="hidden" name="next" value="{{ next }}" />
        {% endif %}
        <button class="submit-btn" type="submit">Sign in</button>
      </form>

      <p class="auth-link-row">
        No account?
        <a href="{% url 'signup' %}">Create one</a>
      </p>
      <a class="home-link" href="{% url 'home' %}">Back to home</a>
    </main>
  </body>
</html>
