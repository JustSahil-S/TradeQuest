<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
  </head>
  <body>
    <h1>Login</h1>

    {% if form.errors %}
      <p style="color: #b00020;">Invalid username or password.</p>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div>
        <label for="id_username">Username</label>
        {{ form.username }}
      </div>
      <div>
        <label for="id_password">Password</label>
        {{ form.password }}
      </div>
      {% if next %}
        <input type="hidden" name="next" value="{{ next }}" />
      {% endif %}
      <button type="submit">Sign in</button>
    </form>

    <p>
      No account?
      <a href="{% url 'signup' %}">Create one</a>
    </p>
  </body>
</html>
